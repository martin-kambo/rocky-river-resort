name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ─── Lint & type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Generate Prisma client BEFORE tsc so enums resolve from @prisma/client
      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate
      - name: Type-check API
        run: cd apps/api && npx tsc --noEmit
      - name: Type-check Web
        run: cd apps/web && npx tsc --noEmit

  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       rrr_test
          POSTGRES_USER:     rrr_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
    env:
      DATABASE_URL:       postgresql://rrr_user:test_password@localhost:5432/rrr_test
      JWT_SECRET:         test-secret-32-chars-minimum-required
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars-min
      NODE_ENV:           test
      RESEND_API_KEY:     re_test_placeholder
      EMAIL_FROM:         "Rocky River Resort <test@example.com>"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate
      - name: Run migrations
        run: cd apps/api && npx prisma migrate deploy
      - name: Run domain tests
        run: cd apps/api && npm test -- src/domain --passWithNoTests --no-coverage
      - name: Run module tests
        run: cd apps/api && npm test -- src/modules --passWithNoTests --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage
          flags: api

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── Deploy — Render + Netlify ───────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy API to Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id','ok'))"
      - name: Deploy Web to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: apps/web/.next
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
      - name: Notify on completion
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "✅ Rocky River Resort deployed — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}