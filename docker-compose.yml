# Rocky River Resort — local development stack
# Phase 1: PostgreSQL only. No Redis.
# Usage: docker compose up postgres -d   (database only)
#        docker compose up               (full stack)

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rrr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rocky_river_resort}
      POSTGRES_USER:     ${POSTGRES_USER:-rrr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rrr_user}"]
      interval: 10s
      timeout:  5s
      retries:  5

  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile.dev
    container_name: rrr_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rrr_user}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-rocky_river_resort}
      NODE_ENV:     development
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/src:delegated
      - ./packages:/packages:delegated
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

  web:
    build:
      context:    ./apps/web
      dockerfile: Dockerfile.dev
    container_name: rrr_web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src:delegated
      - ./packages:/packages:delegated
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data: